    }

      line-height: 1.4;
      margin: 24px 0;

    }
    .answer {

      font-size: 1.3rem;

      margin-bottom: 20px;
    }
    button {

      padding: 16px;
      margin-top: 12px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .show {
      background: #0077cc;
      color: white;
    }
    .next {
      background: #222;
      color: white;
    }
    .score-buttons {
      display: flex;
      gap: 10px;
    }
    .score-buttons button {
      flex: 1;
    }
    .correct {
      background: #2e8b57;
      color: white;
    }
    .wrong {
      background: #b22222;
      color: white;
    }
    .score {
      text-align: center;
      margin-top: 18px;
      font-size: 1rem;
      color: #555;

    select {

    <button class="next" onclick="newQuestion()">Next Question</button>

    let currentQuestion = null;
    let correct = 0;
    let total = 0;
    function getFilteredTrivia() {
      const selectedCategory = document.getElementById("categoryFilter").value;
      if (selectedCategory === "All") {
        return trivia;
      }
      return trivia.filter(item => item.category === selectedCategory);
    }
    function newQuestion() {
      const filteredTrivia = getFilteredTrivia();
      if (filteredTrivia.length === 0) {
        document.getElementById("question").textContent = "No questions available.";
        document.getElementById("answer").textContent = "";
        document.getElementById("category").textContent = "";
        return;
      }
      const randomIndex = Math.floor(Math.random() * filteredTrivia.length);
      currentQuestion = filteredTrivia[randomIndex];
      document.getElementById("category").textContent = currentQuestion.category;
      document.getElementById("question").textContent = currentQuestion.question;
      document.getElementById("answer").textContent = currentQuestion.answer;
      document.getElementById("answer").style.display = "none";
    }
    function showAnswer() {
      document.getElementById("answer").style.display = "block";
    }
    function markCorrect() {
      correct++;
      total++;
      updateScore();
      newQuestion();
    }
    function markWrong() {
      total++;
      updateScore();
      newQuestion();
    }
    function updateScore() {
      document.getElementById("score").textContent =
        `Score: ${correct} correct / ${total} total`;
    }
    newQuestion();
