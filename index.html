Here’s a simple one-file web app. Save it as trivia-road-trip.html, then open it in your phone/browser.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Trip Trivia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .app {
      max-width: 600px;
      margin: auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }
    h1 {
      text-align: center;
      margin-top: 0;
    }
    .category {
      text-align: center;
      font-weight: bold;
      color: #555;
      margin-bottom: 16px;
    }
    .question {
      font-size: 1.5rem;
      line-height: 1.4;
      margin: 24px 0;
      text-align: center;
    }
    .answer {
      display: none;
      background: #eef7ee;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.3rem;
      text-align: center;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .show {
      background: #0077cc;
      color: white;
    }
    .next {
      background: #222;
      color: white;
    }
    .score-buttons {
      display: flex;
      gap: 10px;
    }
    .score-buttons button {
      flex: 1;
    }
    .correct {
      background: #2e8b57;
      color: white;
    }
    .wrong {
      background: #b22222;
      color: white;
    }
    .score {
      text-align: center;
      margin-top: 18px;
      font-size: 1rem;
      color: #555;
    }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Road Trip Trivia</h1>
    <select id="categoryFilter" onchange="newQuestion()">
      <option value="All">All Categories</option>
      <option value="General">General</option>
      <option value="History">History</option>
      <option value="Science">Science</option>
      <option value="Geography">Geography</option>
      <option value="Movies">Movies</option>
      <option value="Sports">Sports</option>
    </select>
    <div class="category" id="category"></div>
    <div class="question" id="question"></div>
    <div class="answer" id="answer"></div>
    <button class="show" onclick="showAnswer()">Show Answer</button>
    <div class="score-buttons">
      <button class="correct" onclick="markCorrect()">Correct</button>
      <button class="wrong" onclick="markWrong()">Wrong</button>
    </div>
    <button class="next" onclick="newQuestion()">Next Question</button>
    <div class="score" id="score">Score: 0 correct / 0 total</div>
  </div>
  <script>
    const trivia = [
      {
        category: "General",
        question: "What is the only food that never spoils?",
        answer: "Honey"
      },
      {
        category: "General",
        question: "How many time zones are there in Russia?",
        answer: "11"
      },
      {
        category: "History",
        question: "Who was the first president of the United States?",
        answer: "George Washington"
      },
      {
        category: "History",
        question: "In what year did the Titanic sink?",
        answer: "1912"
      },
      {
        category: "Science",
        question: "What planet is known as the Red Planet?",
        answer: "Mars"
      },
      {
        category: "Science",
        question: "What gas do plants absorb from the atmosphere?",
        answer: "Carbon dioxide"
      },
      {
        category: "Geography",
        question: "What is the capital of Canada?",
        answer: "Ottawa"
      },
      {
        category: "Geography",
        question: "Which country has the most natural lakes?",
        answer: "Canada"
      },
      {
        category: "Movies",
        question: "What movie features the quote, 'I'll be back'?",
        answer: "The Terminator"
      },
      {
        category: "Movies",
        question: "Who directed Jurassic Park?",
        answer: "Steven Spielberg"
      },
      {
        category: "Sports",
        question: "How many players are on the field for one soccer team?",
        answer: "11"
      },
      {
        category: "Sports",
        question: "What sport uses the terms birdie, eagle, and bogey?",
        answer: "Golf"
      }
    ];
    let currentQuestion = null;
    let correct = 0;
    let total = 0;
    function getFilteredTrivia() {
      const selectedCategory = document.getElementById("categoryFilter").value;
      if (selectedCategory === "All") {
        return trivia;
      }
      return trivia.filter(item => item.category === selectedCategory);
    }
    function newQuestion() {
      const filteredTrivia = getFilteredTrivia();
      if (filteredTrivia.length === 0) {
        document.getElementById("question").textContent = "No questions available.";
        document.getElementById("answer").textContent = "";
        document.getElementById("category").textContent = "";
        return;
      }
      const randomIndex = Math.floor(Math.random() * filteredTrivia.length);
      currentQuestion = filteredTrivia[randomIndex];
      document.getElementById("category").textContent = currentQuestion.category;
      document.getElementById("question").textContent = currentQuestion.question;
      document.getElementById("answer").textContent = currentQuestion.answer;
      document.getElementById("answer").style.display = "none";
    }
    function showAnswer() {
      document.getElementById("answer").style.display = "block";
    }
    function markCorrect() {
      correct++;
      total++;
      updateScore();
      newQuestion();
    }
    function markWrong() {
      total++;
      updateScore();
      newQuestion();
    }
    function updateScore() {
      document.getElementById("score").textContent =
        `Score: ${correct} correct / ${total} total`;
    }
    newQuestion();
  </script>
</body>
</html>

This works fully offline once saved.
